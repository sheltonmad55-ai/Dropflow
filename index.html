<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="https://img.icons8.com/fluency/48/000000/combo-chart.png" />
    <link rel="manifest" href="/manifest.json" />
    <title>DroopFlow — Gestão Financeira Inteligente</title>
    <script>
      (function() {
        try {
          const theme = localStorage.getItem('dropflow_theme');
          if (theme === 'dark') {
            document.documentElement.classList.add('dark');
          } else {
            document.documentElement.classList.remove('dark');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
